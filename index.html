<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Gaitán — NBA en español</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111111;
    --paper: #f5f0e8;
    --accent: #007A33;
    --muted: #7a7060;
    --rule: #d4cfc5;
    --paid-badge: #1a3a5c;
    --relevo: #FF34EF;
    --substack: #007A33;
    --solobasket: #E8620A;
    --gigantes: #CC0000;
    --wordpress: #3D9CD2;
    --outsiders: #111111;
    --upunder: #1B3A6B;
    --youtube: #FFD700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  header {
    border-bottom: 3px solid var(--ink);
    padding: 0 5vw;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0 0.75rem;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--rule);
  }

  .masthead {
    padding: 2.5rem 0 2rem;
    text-align: center;
  }

  .masthead h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.02em;
  }

  .masthead h1 span { color: var(--accent); font-style: italic; }

  .masthead-sub {
    margin-top: 1rem;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-stats {
    display: flex;
    justify-content: center;
    gap: 3rem;
    padding: 1.25rem 0 1.5rem;
    border-top: 1px solid var(--rule);
    margin-top: 1.5rem;
  }

  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }

  .controls {
    padding: 1.25rem 5vw;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 0.55rem 1rem 0.55rem 2.2rem;
    border: 1.5px solid var(--ink);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--ink);
    outline: none;
  }

  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }

  .filter-group { display: flex; gap: 0.4rem; flex-wrap: wrap; }

  .filter-btn {
    padding: 0.4rem 0.75rem;
    border: 1.5px solid var(--ink);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.12s;
    white-space: nowrap;
  }

  .filter-btn:hover { background: var(--ink); color: var(--paper); }
  .filter-btn.active { background: var(--ink); color: var(--paper); }
  .filter-btn.relevo-active { background: var(--relevo); color: white; border-color: var(--relevo); }
  .filter-btn.substack-active { background: var(--substack); color: white; border-color: var(--substack); }
  .filter-btn.podcast-active { background: #6b4fbb; color: white; border-color: #6b4fbb; }

  .results-count {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-left: auto;
    flex-shrink: 0;
  }

  main {
    padding: 0 5vw;
    max-width: 1400px;
    margin: 0 auto;
  }

  .year-section { margin-top: 3rem; }

  .year-label {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 900;
    color: var(--rule);
    line-height: 1;
    margin-bottom: -1rem;
    user-select: none;
  }

  .articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    border-top: 1.5px solid var(--ink);
  }

  .article-card {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
    transition: background 0.12s;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    text-decoration: none;
    color: inherit;
    position: relative;
  }

  .article-card:hover { background: white; }
  .article-card:hover .article-title { color: var(--accent); }

  .card-meta { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }

  .card-date { font-size: 0.63rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

  .badge {
    font-size: 0.56rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.12rem 0.35rem;
    font-weight: 500;
    border-radius: 1px;
  }

  .badge-relevo { background: var(--relevo); color: white; }
  .badge-substack { background: var(--substack); color: white; }
  .badge-paid { background: var(--paid-badge); color: white; }
  .badge-podcast { background: #6b4fbb; color: white; }
  .badge-solobasket { background: var(--solobasket); color: white; }
  .badge-gigantes { background: var(--gigantes); color: white; }
  .badge-wordpress { background: var(--wordpress); color: white; }
  .badge-outsiders { background: var(--outsiders); color: white; border: 1px solid #444; }
  .badge-upunder { background: var(--upunder); color: white; }
  .badge-youtube { background: var(--youtube); color: #111111; }

  .article-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.3;
    transition: color 0.12s;
    padding-right: 1rem;
  }

  .article-sub {
    font-size: 0.73rem;
    color: var(--muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-arrow {
    position: absolute;
    right: 0.75rem;
    top: 1rem;
    color: var(--rule);
    font-size: 0.9rem;
    transition: all 0.12s;
  }

  .article-card:hover .card-arrow { color: var(--accent); right: 0.5rem; }

  .article-card-wrapper {
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
  }

  .article-card-wrapper .article-card {
    border-bottom: none;
    border-right: none;
    flex: 1;
  }

  .article-card-wrapper .tags {
    padding: 0 1.25rem 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .empty-state {
    padding: 4rem 0;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    grid-column: 1/-1;
  }

  .loading {
    padding: 5rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  footer {
    margin-top: 4rem;
    border-top: 3px solid var(--ink);
    padding: 2rem 5vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  footer p { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  footer a { color: var(--accent); text-decoration: none; font-weight: 500; }

  .tag {
    display: inline-block;
    background-color: #e5e7eb;
    color: #111827;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.12s;
    border: 1px solid transparent;
  }

  .tag:hover { background-color: var(--ink); color: var(--paper); }
  .tag.active { background-color: var(--ink); color: var(--paper); border-color: var(--ink); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span>Periodista NBA</span>
    <span>Portafolio en español</span>
    <span id="today-date"></span>
  </div>
  <div class="masthead">
    <h1>Alejandro <span>Gaitán</span></h1>
    <p class="masthead-sub">Periodismo NBA en español · 2015–2026</p>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Artículos</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-relevo">—</div>
      <div class="stat-label">En Relevo</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-substack">—</div>
      <div class="stat-label">En Substack</div>
    </div>
    <div class="stat">
      <div class="stat-num">11</div>
      <div class="stat-label">Temporadas</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap" style="width:100%;">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Buscar por título…" oninput="applyFilters()">
  </div>
  <div class="filter-group" id="year-filters">
    <button class="filter-btn active" data-year="all" onclick="setYear(this)">Todo</button>
    <button class="filter-btn" data-year="2026" onclick="setYear(this)">2026</button>
    <button class="filter-btn" data-year="2025" onclick="setYear(this)">2025</button>
    <button class="filter-btn" data-year="2024" onclick="setYear(this)">2024</button>
    <button class="filter-btn" data-year="2023" onclick="setYear(this)">2023</button>
    <button class="filter-btn" data-year="2022" onclick="setYear(this)">2022</button>
    <button class="filter-btn" data-year="2021" onclick="setYear(this)">2021</button>
    <button class="filter-btn" data-year="2020" onclick="setYear(this)">2020</button>
    <button class="filter-btn" data-year="2019" onclick="setYear(this)">2019</button>
    <button class="filter-btn" data-year="2018" onclick="setYear(this)">2018</button>
    <button class="filter-btn" data-year="2017" onclick="setYear(this)">2017</button>
    <button class="filter-btn" data-year="2016" onclick="setYear(this)">2016</button>
    <button class="filter-btn" data-year="2015" onclick="setYear(this)">2015</button>
  </div>
  <div class="filter-group">
    <button class="filter-btn active" data-src="all" onclick="setSrc(this)">Todos</button>
    <button class="filter-btn" data-src="R" onclick="setSrc(this)">Relevo</button>
    <button class="filter-btn" data-src="S" onclick="setSrc(this)">Substack</button>
    <button class="filter-btn" data-src="SB" onclick="setSrc(this)">Solobasket</button>
    <button class="filter-btn" data-src="G" onclick="setSrc(this)">Gigantes</button>
    <button class="filter-btn" data-src="WP" onclick="setSrc(this)">Wordpress</button>
    <button class="filter-btn" data-src="O" onclick="setSrc(this)">Outsiders</button>
    <button class="filter-btn" data-src="UU" onclick="setSrc(this)">Up & Under</button>
    <button class="filter-btn" data-src="YT" onclick="setSrc(this)">YouTube</button>
  </div>
  <div class="filter-group">
    <button class="filter-btn" data-pod="1" onclick="setPod(this)">🎙 Podcast</button>
    <button class="filter-btn" data-vid="1" onclick="setVid(this)">🎥 Vídeo</button>
  </div>
  <span class="results-count" id="results-count"></span>
  <div id="active-tags-bar" style="display:none; width:100%; display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center; padding-top:0.25rem;">
    <span style="font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted);">Tags:</span>
    <div id="active-tags-list" style="display:flex; gap:0.4rem; flex-wrap:wrap;"></div>
    <button onclick="clearTags()" style="font-size:0.65rem; letter-spacing:0.08em; text-transform:uppercase; background:none; border:none; cursor:pointer; color:var(--muted); text-decoration:underline; padding:0;">Limpiar</button>
  </div>
</div>

<main id="main-content"><div class="loading">Cargando artículos…</div></main>

<footer>
  <p>© Alejandro Gaitán · <a href="https://alejandroggo.substack.com" target="_blank">Substack</a> · <a href="https://www.relevo.com/autor/alejandro-gaitan-5475.html" target="_blank">Relevo</a></p>
  <p>Portfolio generado en marzo 2026</p>
</footer>

<script>
// ── Estado global ──────────────────────────────────────────────
let allArticles = [];
let activeYear  = 'all';
let activeSrc   = 'all';
let activePod   = false;
let activeTags  = [];

// ── Función para manejar clicks en tags ─────────────────────────
function toggleTag(event, tag) {
  event.preventDefault();
  event.stopPropagation();

  const index = activeTags.indexOf(tag);
  if (index > -1) {
    activeTags.splice(index, 1);
  } else {
    activeTags.push(tag);
  }

  applyFilters();
}

function clearTags() {
  activeTags = [];
  applyFilters();
}


  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

  // ── Utilidad: formato de fecha ─────────────────────────────────
  function formatDate(d) {
    const [y, m, day] = d.split('-');
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${+day} ${months[+m - 1]} ${y}`;
  }

  // ── Filtros de año y fuente ────────────────────────────────────
  function setYear(btn) {
    document.querySelectorAll('[data-year]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeYear = btn.dataset.year;
    applyFilters();
  }

  function setSrc(btn) {
    document.querySelectorAll('[data-src]').forEach(b => {
      b.classList.remove('active', 'relevo-active', 'substack-active', 'src-active');
    });
    btn.classList.add('active');
    if (btn.dataset.src === 'R')  btn.classList.add('relevo-active');
    if (btn.dataset.src === 'S')  btn.classList.add('substack-active');
    activeSrc = btn.dataset.src;
    applyFilters();
  }

  function setPod(btn) {
    activePod = !activePod;
    btn.classList.toggle('active', activePod);
    btn.classList.toggle('podcast-active', activePod);
    applyFilters();
  }

  function setVid(btn) {
    activeVid = !activeVid;
    btn.classList.toggle('active', activeVid);
    btn.classList.toggle('video-active', activeVid);
    applyFilters();
  }

  // ── Badge por medio ────────────────────────────────────────────
  const MEDIOS = {
    R:  { label: 'Relevo',      cls: 'relevo'     },
    S:  { label: 'Substack',    cls: 'substack'   },
    SB: { label: 'Solobasket',  cls: 'solobasket' },
    G:  { label: 'Gigantes',    cls: 'gigantes'   },
    WP: { label: 'Wordpress',   cls: 'wordpress'  },
    O:  { label: 'Outsiders',   cls: 'outsiders'  },
    UU: { label: 'Up & Under',  cls: 'upunder'    },
    YT: { label: 'YouTube', cls: 'youtube' },
  };
  function badgeFor(s) {
    const m = MEDIOS[s];
    if (!m) return '';
    return `<span class="badge badge-${m.cls}">${m.label}</span>`;
  }

  // ── Renderizado principal ──────────────────────────────────────
function applyFilters() {
  const searchInput = document.getElementById('search').value.toLowerCase();

  const filtered = allArticles.filter(a => {
    const matchesYear   = activeYear === 'all' || String(a.y) === activeYear;
    const matchesSrc    = activeSrc  === 'all' || a.s === activeSrc;
    const matchesPod    = !activePod || a.pod === 1;
    const matchesVid = !activeVid || a.vid === 1;
    const matchesSearch = a.t.toLowerCase().includes(searchInput) || (a.sub?.toLowerCase().includes(searchInput) ?? false);
    const matchesTags   = activeTags.length === 0 || activeTags.every(tag => a.tags?.includes(tag));
    return matchesYear && matchesSrc && matchesPod && matchesVid && matchesSearch && matchesTags;
  });

  document.getElementById('results-count').textContent =
    `Mostrando ${filtered.length.toLocaleString('es-ES')} de ${allArticles.length.toLocaleString('es-ES')} artículos`;

  // Actualizar barra de tags activos
  const bar = document.getElementById('active-tags-bar');
  const list = document.getElementById('active-tags-list');
  if (activeTags.length > 0) {
    bar.style.display = 'flex';
    list.innerHTML = activeTags.map(tag =>
      `<span class="tag active" onclick="toggleTag(event, '${tag}')">${tag} ✕</span>`
    ).join('');
  } else {
    bar.style.display = 'none';
    list.innerHTML = '';
  }

  const byYear = {};
  filtered.forEach(a => {
    if (!byYear[a.y]) byYear[a.y] = [];
    byYear[a.y].push(a);
  });

  const years = Object.keys(byYear).sort((a, b) => b - a);
  const main = document.getElementById('main-content');

  if (filtered.length === 0) {
    main.innerHTML = `
      <div class="articles-grid">
        <div class="empty-state">
          No se han encontrado resultados.<br><br>
          Prueba a eliminar algunos filtros o cambiar la búsqueda.
        </div>
      </div>
    `;
    return;
  }

  main.innerHTML = years.map(year => `
    <div class="year-section">
      <div class="year-label">${year}</div>
      <div class="articles-grid">
        ${byYear[year].map(a => `
          <div class="article-card-wrapper">
            <a class="article-card" href="${a.u}" target="_blank" rel="noopener">
              <div class="card-meta">
                <span class="card-date">${formatDate(a.d)}</span>
                ${badgeFor(a.s)}
                ${a.p   ? '<span class="badge badge-paid">Suscriptores</span>' : ''}
                ${a.pod ? '<span class="badge badge-podcast">Podcast</span>' : ''}
              </div>
              <div class="article-title">${a.t}</div>
              ${a.sub ? `<div class="article-sub">${a.sub}</div>` : ''}
              <span class="card-arrow">→</span>
            </a>
            ${a.tags ? `<div class="tags">${a.tags.map(tag =>
              `<span class="tag${activeTags.includes(tag) ? ' active' : ''}" onclick="toggleTag(event, '${tag}')">${tag}</span>`
            ).join('')}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}
  // ── Carga de datos ─────────────────────────────────────────────
  fetch('data.json')
    .then(r => r.json())
    .then(data => {
      allArticles = data;

      document.getElementById('stat-total').textContent   = data.length.toLocaleString('es-ES');
      document.getElementById('stat-relevo').textContent  = data.filter(a => a.s === 'R').length.toLocaleString('es-ES');
      document.getElementById('stat-substack').textContent = data.filter(a => a.s === 'S').length.toLocaleString('es-ES');

      activeYear = 'all';
activeSrc = 'all';
activePod = false;
activeVid = false;      
activeTags = [];
document.getElementById('search').value = '';
document.querySelectorAll('[data-year]').forEach(b => b.classList.remove('active'));
document.querySelector('[data-year="all"]').classList.add('active');

document.querySelectorAll('[data-src]').forEach(b => b.classList.remove('active', 'relevo-active', 'substack-active'));
document.querySelector('[data-src="all"]').classList.add('active');
document.querySelectorAll('[data-pod]').forEach(b => b.classList.remove('active', 'podcast-active'));
document.querySelectorAll('[data-vid]').forEach(b => b.classList.remove('active', 'video-active'));      
      
applyFilters();
    })
    .catch(() => {
      document.getElementById('main-content').innerHTML =
        '<div class="loading">Error cargando datos. Asegúrate de que data.json está en la misma carpeta.</div>';
    });
</script>
</body>
</html>
