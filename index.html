<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Gaitán — NBA en español</title>

  <link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111111;
    --paper: #f5f0e8;
    --accent: #007A33;
    --muted: #7a7060;
    --rule: #d4cfc5;
    --paid-badge: #1a3a5c;
    --relevo: #FF34EF;
    --substack: #007A33;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  header {
    border-bottom: 3px solid var(--ink);
    padding: 0 5vw;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0 0.75rem;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--rule);
  }

  .masthead {
    padding: 2.5rem 0 2rem;
    text-align: center;
  }

  .masthead h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.02em;
  }

  .masthead h1 span { color: var(--accent); font-style: italic; }

  .masthead-sub {
    margin-top: 1rem;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-stats {
    display: flex;
    justify-content: center;
    gap: 3rem;
    padding: 1.25rem 0 1.5rem;
    border-top: 1px solid var(--rule);
    margin-top: 1.5rem;
  }

  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }

  .controls {
    padding: 1.25rem 5vw;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 0.55rem 1rem 0.55rem 2.2rem;
    border: 1.5px solid var(--ink);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--ink);
    outline: none;
  }

  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }

  .filter-group { display: flex; gap: 0.4rem; flex-wrap: wrap; }

  .filter-btn {
    padding: 0.4rem 0.75rem;
    border: 1.5px solid var(--ink);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.12s;
    white-space: nowrap;
  }

  .filter-btn:hover { background: var(--ink); color: var(--paper); }
  .filter-btn.active { background: var(--ink); color: var(--paper); }
  .filter-btn.relevo-active { background: var(--relevo); color: white; border-color: var(--relevo); }
  .filter-btn.substack-active { background: var(--substack); color: white; border-color: var(--substack); }

  .results-count {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-left: auto;
    flex-shrink: 0;
  }

  main {
    padding: 0 5vw;
    max-width: 1400px;
    margin: 0 auto;
  }

  .year-section { margin-top: 3rem; }

  .year-label {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 900;
    color: var(--rule);
    line-height: 1;
    margin-bottom: -1rem;
    user-select: none;
  }

  .articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    border-top: 1.5px solid var(--ink);
  }

  .article-card {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
    transition: background 0.12s;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    text-decoration: none;
    color: inherit;
    position: relative;
  }

  .article-card:hover { background: white; }
  .article-card:hover .article-title { color: var(--accent); }

  .card-meta { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }

  .card-date { font-size: 0.63rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

  .badge {
    font-size: 0.56rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.12rem 0.35rem;
    font-weight: 500;
    border-radius: 1px;
  }

  .badge-relevo { background: var(--relevo); color: white; }
  .badge-substack { background: var(--substack); color: white; }
  .badge-paid { background: var(--paid-badge); color: white; }
  .badge-podcast { background: #6b4fbb; color: white; }

  .article-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.3;
    transition: color 0.12s;
    padding-right: 1rem;
  }

  .article-sub {
    font-size: 0.73rem;
    color: var(--muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-arrow {
    position: absolute;
    right: 0.75rem;
    top: 1rem;
    color: var(--rule);
    font-size: 0.9rem;
    transition: all 0.12s;
  }

  .article-card:hover .card-arrow { color: var(--accent); right: 0.5rem; }

  .empty-state {
    padding: 4rem 0;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    grid-column: 1/-1;
  }

  .loading {
    padding: 5rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  footer {
    margin-top: 4rem;
    border-top: 3px solid var(--ink);
    padding: 2rem 5vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  footer p { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .tags {
  margin-top: 8px;
}

.tag {
  display: inline-block;
  background-color: #e5e7eb;
  color: #111827;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 999px;
  margin-right: 6px;
  margin-top: 4px;
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span>Periodista NBA</span>
    <span>Portafolio en español</span>
    <span id="today-date"></span>
  </div>
  <div class="masthead">
    <h1>Alejandro <span>Gaitán</span></h1>
    <p class="masthead-sub">Periodismo NBA en español · 2022–2026</p>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Artículos</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-relevo">—</div>
      <div class="stat-label">En Relevo</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-substack">—</div>
      <div class="stat-label">En Substack</div>
    </div>
    <div class="stat">
      <div class="stat-num">5</div>
      <div class="stat-label">Temporadas</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Buscar por título…" oninput="applyFilters()">
  </div>
  <div class="filter-group" id="year-filters">
    <button class="filter-btn active" data-year="all" onclick="setYear(this)">Todo</button>
    <button class="filter-btn" data-year="2026" onclick="setYear(this)">2026</button>
    <button class="filter-btn" data-year="2025" onclick="setYear(this)">2025</button>
    <button class="filter-btn" data-year="2024" onclick="setYear(this)">2024</button>
    <button class="filter-btn" data-year="2023" onclick="setYear(this)">2023</button>
    <button class="filter-btn" data-year="2022" onclick="setYear(this)">2022</button>
  </div>
  <div class="filter-group">
    <button class="filter-btn active" data-src="all" onclick="setSrc(this)">Todos</button>
    <button class="filter-btn" data-src="R" onclick="setSrc(this)">Relevo</button>
    <button class="filter-btn" data-src="S" onclick="setSrc(this)">Substack</button>
  </div>
  <span class="results-count" id="results-count"></span>
</div>

<main id="main-content"><div class="loading">Cargando artículos…</div></main>

<footer>
  <p>© Alejandro Gaitán · <a href="https://alejandroggo.substack.com" target="_blank">Substack</a> · <a href="https://www.relevo.com/autor/alejandro-gaitan-5475.html" target="_blank">Relevo</a></p>
  <p>Portfolio generado en marzo 2026</p>
</footer>

<script>
let ARTICLES = [];
let activeYear = 'all';
let activeSrc = 'all';

document.getElementById('today-date').textContent = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

function formatDate(d) {
  const [y, m, day] = d.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function setYear(btn) {
  document.querySelectorAll('[data-year]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeYear = btn.dataset.year;
  applyFilters();
}

function setSrc(btn) {
  document.querySelectorAll('[data-src]').forEach(b => { b.classList.remove('active','relevo-active','substack-active'); });
  btn.classList.add('active');
  if (btn.dataset.src === 'R') btn.classList.add('relevo-active');
  if (btn.dataset.src === 'S') btn.classList.add('substack-active');
  activeSrc = btn.dataset.src;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = ARTICLES.filter(a => {
    if (activeYear !== 'all' && a.y !== parseInt(activeYear)) return false;
    if (activeSrc !== 'all' && a.s !== activeSrc) return false;
    if (q && !a.t.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('results-count').textContent = `${filtered.length.toLocaleString('es-ES')} resultado${filtered.length !== 1 ? 's' : ''}`;

  const byYear = {};
  filtered.forEach(a => {
    if (!byYear[a.y]) byYear[a.y] = [];
    byYear[a.y].push(a);
  });

  const years = Object.keys(byYear).sort((a,b) => b-a);
  const main = document.getElementById('main-content');

  if (filtered.length === 0) {
    main.innerHTML = '<div class="articles-grid"><div class="empty-state">No se han encontrado resultados.</div></div>';
    return;
  }

  main.innerHTML = years.map(year => `
    <div class="year-section">
      <div class="year-label">${year}</div>
      <div class="articles-grid">
        ${byYear[year].map(a => `
          <a class="article-card" href="${a.u}" target="_blank" rel="noopener">
            <div class="card-meta">
              <span class="card-date">${formatDate(a.d)}</span>
              <span class="badge badge-${a.s === 'S' ? 'substack' : 'relevo'}">${a.s === 'S' ? 'Substack' : 'Relevo'}</span>
              ${a.p ? '<span class="badge badge-paid">Suscriptores</span>' : ''}
              ${a.pod ? '<span class="badge badge-podcast">Podcast</span>' : ''}
            </div>
            <div class="article-title">${a.t}</div>
            ${a.sub ? `<div class="article-sub">${a.sub}</div>` : ''}
            ${a.tags ? `<div class="tags">${a.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>` : ''}
            <span class="card-arrow">→</span>
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// Load data
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    ARTICLES = data;
    document.getElementById('stat-total').textContent = data.length.toLocaleString('es-ES');
    document.getElementById('stat-relevo').textContent = data.filter(a => a.s === 'R').length.toLocaleString('es-ES');
    document.getElementById('stat-substack').textContent = data.filter(a => a.s === 'S').length.toLocaleString('es-ES');
    applyFilters();
  })
  .catch(err => {
    document.getElementById('main-content').innerHTML = '<div class="loading">Error cargando datos. Asegúrate de que data.json está en la misma carpeta.</div>';
  });
</script>
</body>
</html>
