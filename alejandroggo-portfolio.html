let activeYear = 'all';
let activeAud = 'all';

document.getElementById('today-date').textContent = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

function setYear(btn) {
  document.querySelectorAll('[data-year]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeYear = btn.dataset.year;
  applyFilters();
}

function setAud(btn) {
  document.querySelectorAll('[data-aud]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeAud = btn.dataset.aud;
  applyFilters();
}

function formatDate(d) {
  const [y, m, day] = d.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = ARTICLES.filter(a => {
    if (activeYear !== 'all' && a.year !== parseInt(activeYear)) return false;
    if (activeAud !== 'all' && a.audience !== activeAud) return false;
    if (q && !a.title.toLowerCase().includes(q) && !a.subtitle.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('results-count').textContent = `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}`;

  const byYear = {};
  filtered.forEach(a => {
    if (!byYear[a.year]) byYear[a.year] = [];
    byYear[a.year].push(a);
  });

  const years = Object.keys(byYear).sort((a,b) => b-a);
  const main = document.getElementById('main-content');

  if (filtered.length === 0) {
    main.innerHTML = '<div class="articles-grid"><div class="empty-state">No se han encontrado resultados.</div></div>';
    return;
  }

  main.innerHTML = years.map(year => `
    <div class="year-section">
      <div class="year-label">${year}</div>
      <div class="articles-grid">
        ${byYear[year].map(a => `
          <a class="article-card" href="${a.url}" target="_blank" rel="noopener">
            <div class="card-meta">
              <span class="card-date">${formatDate(a.date)}</span>
              ${a.audience === 'only_paid' ? '<span class="badge badge-paid">Suscriptores</span>' : ''}
              ${a.type === 'podcast' ? '<span class="badge badge-podcast">Podcast</span>' : ''}
            </div>
            <div class="article-title">${a.title}</div>
            ${a.subtitle ? `<div class="article-sub">${a.subtitle}</div>` : ''}
            <span class="card-arrow">→</span>
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');
}

applyFilters();
</script>
